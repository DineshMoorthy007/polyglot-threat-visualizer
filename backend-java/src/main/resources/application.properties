spring.application.name=backend-java

spring.datasource.url=jdbc:mysql://${JAVA_DB_HOST}:${JAVA_DB_PORT}/${JAVA_DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${JAVA_DB_USER}
spring.datasource.password=${JAVA_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true