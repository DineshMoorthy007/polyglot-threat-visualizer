services:
  mysql-java:
    image: mysql:8
    container_name: mysql-java
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${JAVA_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${JAVA_DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s
    networks:
      - threat-net

  mysql-go:
    image: mysql:8
    container_name: mysql-go
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: ${GO_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${GO_DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s
    networks:
      - threat-net

  backend-java:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: backend-java
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql-java:
        condition: service_healthy
    networks:
      - threat-net

  backend-go:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: backend-go
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      mysql-go:
        condition: service_healthy
    networks:
      - threat-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend-java
      - backend-go
    networks:
      - threat-net

networks:
  threat-net:
    driver: bridge
